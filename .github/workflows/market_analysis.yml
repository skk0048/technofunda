    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run Brazil analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_BR: ${{ secrets.GOOGLE_SHEET_URL_BR }}
        run: python market_br_gsht.py

      - name: Rebuild homepage index.html
        run: python build_index.py

      - name: Commit and push HTML to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Brazil_Market_Analysis*.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No HTML changes - nothing to commit."
            exit 0
          fi
          git commit -m "Brazil HTML update $(date -u '+%Y-%m-%d %H:%M UTC')"
          PUSHED=0
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}..."
            if git push origin main 2>/dev/null; then
              echo "Push succeeded."; PUSHED=1; break
            fi
            echo "Push rejected - syncing with remote..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main 2>/dev/null; then
              echo "Rebased cleanly."
            else
              echo "Conflict on generated file - regenerating index.html..."
              git checkout --theirs index.html 2>/dev/null || true
              git add index.html 2>/dev/null || true
              git checkout --ours Brazil_Market_Analysis*.html 2>/dev/null || true
              git add Brazil_Market_Analysis*.html 2>/dev/null || true
              git rebase --continue 2>/dev/null || git rebase --skip 2>/dev/null || true
              python build_index.py
              git add -f index.html 2>/dev/null || true
              git commit -m "Brazil index rebuild $(date -u '+%Y-%m-%d %H:%M UTC')" 2>/dev/null || true
            fi
            sleep 8
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::warning::Push did not succeed after retries for Brazil."
          fi

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

  run-scans:
    name: Chartink Scans
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 3 * * 1-5' ||
        github.event.schedule == '0 9 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'scans' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run LongTerm scan
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_SCANS: ${{ secrets.GOOGLE_SHEET_URL_SCANS }}
        run: python LongTerm.py

      - name: Run FnO scan
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL_SCANS: ${{ secrets.GOOGLE_SHEET_URL_SCANS }}
        run: python FnO.py

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json
