# ════════════════════════════════════════════════════════════════════════════
#  TechnoFunda Market Analysis — GitHub Actions v8.0
#
#  KEY FIX v5.8: git push race condition resolved via pull --rebase + retry.
#
#  GOLDEN RULE: cron string in schedule: MUST match github.event.schedule ==
#  exactly — character for character, including spaces. One space off = skip.
#
#  SCHEDULE (all times UTC):
#    India      Run 1 → 04:30 UTC = 10:00 AM IST  (Mon–Fri)
#    India      Run 2 → 09:00 UTC = 02:30 PM IST  (Mon–Fri)
#    USA        Run 1 → 23:30 UTC = 05:00 AM IST  (Mon–Fri IST = Sun–Thu UTC)
#    UK         Run 1 → 17:00 UTC  (after LSE close 16:30)  (Mon–Fri)
#    Canada     Run 1 → 22:00 UTC  (after TSX close 16:00 ET)  (Mon–Fri)
#    Australia  Run 1 → 07:00 UTC  (after ASX close 16:00 AEST)  (Mon–Fri)
#    Germany    Run 1 → 16:30 UTC  (after XETRA close 17:30 CET)  (Mon–Fri)
#    Japan      Run 1 → 07:30 UTC  (after TSE close 15:30 JST)  (Mon–Fri)
#    France     Run 1 → 16:30 UTC  (after Euronext close 17:30 CET)  (Mon–Fri)
#    Brazil     Run 1 → 21:00 UTC  (after B3 close 18:00 BRT)  (Mon–Fri)
#    Scans      Run 1 → 03:00 UTC = 08:30 AM IST
#    Scans      Run 2 → 09:00 UTC = 02:30 PM IST
#
#  REQUIRED GITHUB SECRETS:
#    GOOGLE_CREDENTIALS        — service account JSON content
#    GOOGLE_SHEET_URL          — India sheet URL
#    GOOGLE_SHEET_URL_USA      — US sheet URL
#    GOOGLE_SHEET_URL_UK       — UK sheet URL
#    GOOGLE_SHEET_URL_CA       — Canada sheet URL
#    GOOGLE_SHEET_URL_AU       — Australia sheet URL
#    GOOGLE_SHEET_URL_DE       — Germany sheet URL
#    GOOGLE_SHEET_URL_JP       — Japan sheet URL
#    GOOGLE_SHEET_URL_FR       — France sheet URL
#    GOOGLE_SHEET_URL_BR       — Brazil sheet URL
#    GOOGLE_SHEET_URL_SCANS    — Scans sheet URL
# ════════════════════════════════════════════════════════════════════════════

name: Market Analysis

on:
  schedule:
    # ── INDIA ──────────────────────────────────────────────────────────────
    - cron: "30 4 * * 1-5"    # India Run 1 → 04:30 UTC = 10:00 AM IST
    - cron: "0 9 * * 1-5"     # India Run 2 → 09:00 UTC = 02:30 PM IST

    # ── USA ────────────────────────────────────────────────────────────────
    - cron: "30 23 * * 0-4"   # USA Run 1 → 23:30 UTC Sun–Thu = 05:00 AM IST Mon–Fri

    # ── UK ─────────────────────────────────────────────────────────────────
    - cron: "0 17 * * 1-5"    # UK → 17:00 UTC (after LSE close 16:30)

    # ── CANADA ─────────────────────────────────────────────────────────────
    - cron: "0 22 * * 1-5"    # Canada → 22:00 UTC (after TSX close)

    # ── AUSTRALIA ──────────────────────────────────────────────────────────
    - cron: "0 7 * * 1-5"     # Australia → 07:00 UTC (after ASX close)

    # ── GERMANY ────────────────────────────────────────────────────────────
    - cron: "30 16 * * 1-5"   # Germany → 16:30 UTC (after XETRA close 17:30 CET)

    # ── JAPAN ──────────────────────────────────────────────────────────────
    - cron: "30 7 * * 1-5"    # Japan → 07:30 UTC (after TSE close 15:30 JST)

    # ── FRANCE ─────────────────────────────────────────────────────────────
    - cron: "30 16 * * 1-5"   # France → 16:30 UTC (after Euronext close 17:30 CET)

    # ── BRAZIL ─────────────────────────────────────────────────────────────
    - cron: "0 21 * * 1-5"    # Brazil → 21:00 UTC (after B3 close 18:00 BRT)

    # ── SCANS ──────────────────────────────────────────────────────────────
    - cron: "0 3 * * 1-5"     # Scans Run 1 → 03:00 UTC = 08:30 AM IST
    - cron: "0 9 * * 1-5"     # Scans Run 2 → 09:00 UTC = 02:30 PM IST

  workflow_dispatch:
    inputs:
      market:
        description: "Which market to run"
        required: false
        default: "all"
        type: choice
        options: [all, india, usa, uk, canada, australia, germany, japan, france, brazil, scans]


jobs:

  # ── INDIA ────────────────────────────────────────────────────────────────
  run-india:
    name: India Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '30 4 * * 1-5' ||
        github.event.schedule == '0 9 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'india' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run India analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python market_india_gsht.py

      - name: Rebuild homepage index.html
        run: python build_index.py

      - name: Commit and push HTML to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f India_Market_Analysis*.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No HTML changes — nothing to commit."
            exit 0
          fi
          git commit -m "📊 India HTML update $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}…"
            git pull --rebase origin main && git push && echo "Push succeeded." && break
            echo "Attempt ${attempt} failed. Sleeping 10s before retry…"
            sleep 10
          done

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json


