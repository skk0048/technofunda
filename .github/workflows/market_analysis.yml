# ============================================================================
#  TechnoFunda Market Analysis - GitHub Actions v10.0
#
#  v10.0 ADDITIONS:
#   - 8 new countries: China, South Korea, Taiwan, Switzerland,
#     Saudi Arabia, Netherlands, Spain, Sweden
#   - Total: 17 markets + scans — zero schedule clashes guaranteed
#   - Every job runs on its own unique cron slot (1 job per time slot)
#
#  GOLDEN RULE: cron string in schedule MUST match github.event.schedule
#  exactly — character for character, including spaces.
#
#  FULL SCHEDULE (all times UTC, Mon–Fri):
#  ─────────────────────────────────────────────────────
#  03:00  Scans (morning)
#  04:30  India          (IST 10:00 — post open)
#  07:00  Australia      (AEST 17:00 — post close)
#  07:30  Japan          (JST 16:30 — post close)
#  08:00  China          (CST 16:00 — post close)
#  08:30  South Korea    (KST 17:30 — post close)
#  09:00  Scans (second) + India scan
#  09:30  Taiwan         (CST 17:30 — post close)
#  12:30  Saudi Arabia   (AST 15:30 — post close)
#  17:00  UK             (BST 18:00 — post close)
#  17:30  Switzerland    (CET 18:30 — post close)
#  18:00  Germany        (CET 19:00 — post close)
#  18:30  France         (CET 19:30 — post close)
#  19:00  Netherlands    (CET 20:00 — post close)
#  19:30  Spain          (CET 20:30 — post close)
#  20:00  Sweden         (CET 21:00 — post close)
#  21:00  Brazil         (BRT 18:00 — post close)
#  22:00  Canada         (ET  18:00 — post close)
#  23:30  USA            (ET  19:30 — post close)
#  ─────────────────────────────────────────────────────
#
#  REQUIRED GITHUB SECRETS:
#    GOOGLE_CREDENTIALS
#    GOOGLE_SHEET_URL          (India)
#    GOOGLE_SHEET_URL_USA
#    GOOGLE_SHEET_URL_UK
#    GOOGLE_SHEET_URL_CA
#    GOOGLE_SHEET_URL_AU
#    GOOGLE_SHEET_URL_DE
#    GOOGLE_SHEET_URL_JP
#    GOOGLE_SHEET_URL_FR
#    GOOGLE_SHEET_URL_BR
#    GOOGLE_SHEET_URL_CN       (China)
#    GOOGLE_SHEET_URL_KR       (South Korea)
#    GOOGLE_SHEET_URL_TW       (Taiwan)
#    GOOGLE_SHEET_URL_CH       (Switzerland)
#    GOOGLE_SHEET_URL_SA       (Saudi Arabia)
#    GOOGLE_SHEET_URL_NL       (Netherlands)
#    GOOGLE_SHEET_URL_ES       (Spain)
#    GOOGLE_SHEET_URL_SE       (Sweden)
#    GOOGLE_SHEET_URL_SCANS
# ============================================================================

name: Market Analysis

on:
  schedule:
    # ── Original 9 ──────────────────────────────────────────
    - cron: "30 4 * * 1-5"    # India morning
    - cron: "0 9 * * 1-5"     # India scan / Scans second run
    - cron: "30 23 * * 0-4"   # USA (Sun–Thu UTC = Mon–Fri ET)
    - cron: "0 17 * * 1-5"    # UK
    - cron: "0 22 * * 1-5"    # Canada
    - cron: "0 7 * * 1-5"     # Australia
    - cron: "0 18 * * 1-5"    # Germany
    - cron: "30 18 * * 1-5"   # France
    - cron: "30 7 * * 1-5"    # Japan
    - cron: "0 21 * * 1-5"    # Brazil
    - cron: "0 3 * * 1-5"     # Scans morning
    # ── New 8 countries ─────────────────────────────────────
    - cron: "0 8 * * 1-5"     # China
    - cron: "30 8 * * 1-5"    # South Korea
    - cron: "30 9 * * 1-5"    # Taiwan
    - cron: "30 12 * * 0-4"   # Saudi Arabia (Sun–Thu, Tadawul trading days)
    - cron: "30 17 * * 1-5"   # Switzerland
    - cron: "0 19 * * 1-5"    # Netherlands
    - cron: "30 19 * * 1-5"   # Spain
    - cron: "0 20 * * 1-5"    # Sweden
    - cron: "0 10 * * 1-5"   # Hong Kong (HTML-only)
    - cron: "45 16 * * 1-5"   # Italy (HTML-only)
    - cron: "45 10 * * 1-5"   # Singapore (HTML-only)
    - cron: "15 10 * * 1-5"   # Indonesia (HTML-only)
    - cron: "0 16 * * 1-5"   # South Africa (HTML-only)
    - cron: "30 21 * * 1-5"   # Mexico (HTML-only)
    - cron: "0 11 * * 1-5"   # Thailand (HTML-only)
    - cron: "30 10 * * 1-5"   # Malaysia (HTML-only)
    - cron: "30 11 * * 0-4"   # UAE (HTML-only)
    - cron: "15 16 * * 1-5"   # Poland (HTML-only)
    - cron: "30 16 * * 1-5"   # Turkey (HTML-only)

  workflow_dispatch:
    inputs:
      market:
        description: "Which market to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - india
          - usa
          - uk
          - canada
          - australia
          - germany
          - japan
          - france
          - brazil
          - china
          - southkorea
          - taiwan
          - switzerland
          - saudiarabia
          - netherlands
          - spain
          - sweden
          - hk
          - it
          - sg
          - id
          - za
          - mx
          - th
          - my
          - uae
          - pl
          - tr
          - scans


# ============================================================================
#  REUSABLE PUSH HELPER — each job has its own copy (GHA doesn't share steps)
#  Pattern: fetch → rebase → push × 5 attempts; on conflict regenerate index
# ============================================================================

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  #  ORIGINAL 9 COUNTRIES
  # ──────────────────────────────────────────────────────────────────────────

  run-india:
    name: "🇮🇳 India  04:30 UTC"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 4 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'india' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Write Google credentials
        env: { GOOGLE_CREDENTIALS: "${{ secrets.GOOGLE_CREDENTIALS }}" }
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json
      - name: Run India analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python market_india_gsht.py
      - name: Rebuild homepage
        run: python build_index.py
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f India_Market_Analysis*.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then echo "No changes."; exit 0; fi
          git commit -m "India HTML $(date -u '+%Y-%m-%d %H:%M UTC')"
          PUSHED=0
          for attempt in 1 2 3 4 5; do
            if git push origin main 2>/dev/null; then PUSHED=1; break; fi
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main 2>/dev/null; then
              echo "Rebased."
            else
              git checkout --theirs index.html 2>/dev/null || true
              git add index.html 2>/dev/null || true
              git checkout --ours India_Market_Analysis*.html 2>/dev/null || true
              git add India_Market_Analysis*.html 2>/dev/null || true
              git rebase --continue 2>/dev/null || git rebase --skip 2>/dev/null || true
              python build_index.py
              git add -f index.html 2>/dev/null || true
              git commit -m "India index rebuild $(date -u '+%Y-%m-%d %H:%M UTC')" 2>/dev/null || true
            fi
            sleep 8
          done
          if [ "$PUSHED" != "1" ]; then echo "::warning::Push failed — India."; fi
      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

