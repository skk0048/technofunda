# ============================================================================
#  TechnoFunda Market Analysis - GitHub Actions v9.0
#
#  v9.0 FIXES:
#   - Rate limit (429): write functions now match India's proven throttling
#     (per-call sleeps + batch_format chunks, not one giant batch_update).
#   - Integer ticker crash: CSVs read with dtype=str (Japan symbols like 7203).
#   - index.html merge conflict: push step regenerates index.html on conflict
#     instead of trying to git-merge a generated file.
#
#  GOLDEN RULE: cron string in schedule MUST match github.event.schedule ==
#  exactly - character for character, including spaces.
#
#  SCHEDULE (all times UTC):
#    India      04:30, 09:00  Mon-Fri
#    USA        23:30         Sun-Thu (= Mon-Fri IST)
#    UK         17:00         Mon-Fri
#    Canada     22:00         Mon-Fri
#    Australia  07:00         Mon-Fri
#    Germany    16:30         Mon-Fri
#    Japan      07:30         Mon-Fri
#    France     16:30         Mon-Fri
#    Brazil     21:00         Mon-Fri
#    Scans      03:00, 09:00  Mon-Fri
#
#  REQUIRED GITHUB SECRETS:
#    GOOGLE_CREDENTIALS, GOOGLE_SHEET_URL (India), GOOGLE_SHEET_URL_USA,
#    GOOGLE_SHEET_URL_UK, _CA, _AU, _DE, _JP, _FR, _BR, GOOGLE_SHEET_URL_SCANS
# ============================================================================

name: Market Analysis

on:
  schedule:
    - cron: "30 4 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "30 23 * * 0-4"
    - cron: "0 17 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "0 3 * * 1-5"

  workflow_dispatch:
    inputs:
      market:
        description: "Which market to run"
        required: false
        default: "all"
        type: choice
        options: [all, india, usa, uk, canada, australia, germany, japan, france, brazil, scans]


jobs:

  run-india:
    name: India Market Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 4 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'india' ||
        github.event.inputs.market == 'all'
      ))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json

      - name: Run India analysis
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python market_india_gsht.py

      - name: Rebuild homepage index.html
        run: python build_index.py

      - name: Commit and push HTML to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f India_Market_Analysis*.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No HTML changes - nothing to commit."
            exit 0
          fi
          git commit -m "India HTML update $(date -u '+%Y-%m-%d %H:%M UTC')"
          PUSHED=0
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}..."
            if git push origin main 2>/dev/null; then
              echo "Push succeeded."; PUSHED=1; break
            fi
            echo "Push rejected - syncing with remote..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main 2>/dev/null; then
              echo "Rebased cleanly."
            else
              echo "Conflict on generated file - regenerating index.html..."
              git checkout --theirs index.html 2>/dev/null || true
              git add index.html 2>/dev/null || true
              git checkout --ours India_Market_Analysis*.html 2>/dev/null || true
              git add India_Market_Analysis*.html 2>/dev/null || true
              git rebase --continue 2>/dev/null || git rebase --skip 2>/dev/null || true
              python build_index.py
              git add -f index.html 2>/dev/null || true
              git commit -m "India index rebuild $(date -u '+%Y-%m-%d %H:%M UTC')" 2>/dev/null || true
            fi
            sleep 8
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::warning::Push did not succeed after retries for India."
          fi

      - name: Remove credentials
        if: always()
        run: rm -f /tmp/google_credentials.json

